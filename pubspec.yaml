name: ocean_lens_ar
description: "OceanLens AR - Augmented Reality Ocean Education & Gaming App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # AR - Artırılmış Gerçeklik
  ar_flutter_plugin_2: ^0.0.3

  # 2D Oyun Motoru
  flame: ^1.37.0

  # Animasyonlar
  lottie: ^3.1.3

  # Tipografi
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigasyon
  go_router: ^14.6.2

  # Görsel yükleme
  cached_network_image: ^3.4.1

  # Matematik kütüphanesi
  vector_math: ^2.1.4

  # 3D Model Gösterici (Gestures/Dokunma desteği için)
  model_viewer_plus: ^1.10.0

  # Yerel dosya işlemleri (Çevrimdışı AR model yükleme için)
  path_provider: ^2.1.2
  audioplayers: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fish_models/
    - assets/logos/
    - assets/sounds/
